<style type="text/css">.countdown-link {
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  .countdown-link:hover {
    opacity: 0.95;
  }

  .countdown-breakout {
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
  }

  .countdown-container {
    text-align: center;
    padding: 25px 5%;
    background: linear-gradient(135deg, var(--countdown-bg-start, #000000) 0%, var(--countdown-bg-end, #000000) 100%);
    color: white;
    width: 100%;
    margin: 0;
    overflow: hidden;
    box-sizing: border-box;
    cursor: pointer;
  }

  .countdown-message h2 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    margin: 0 0 8px 0;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .countdown-message p {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    margin: 0 0 20px 0;
    font-weight: 400;
  }

  .countdown-timer {
    display: flex;
    justify-content: center;
    gap: clamp(20px, 2.5vw, 35px);
    margin: 20px auto 0;
    flex-wrap: nowrap;
    max-width: 700px;
  }

  .time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 1 auto;
    min-width: 0;
  }

  .time-value {
    font-size: clamp(2rem, 4.5vw, 3.5rem);
    font-weight: bold;
    background: rgba(255, 255, 255, 0.25);
    padding: clamp(15px, 2vw, 20px) clamp(20px, 3.5vw, 32px);
    border-radius: 10px;
    min-width: clamp(70px, 10vw, 95px);
    display: inline-block;
    box-sizing: border-box;
    line-height: 1.1;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .time-label {
    font-size: clamp(0.75rem, 1.5vw, 0.95rem);
    margin-top: 8px;
    text-transform: uppercase;
    font-weight: 600;

<script>
  (function() {
    'use strict';

    const container = document.currentScript.previousElementSibling.previousElementSibling;
    if (!container || !container.matches('.countdown-container')) return;

    const countdownDate = new Date(container.getAttribute('data-countdown-end')).getTime();

    function setupTrackingLinks() {
      const links = container.querySelectorAll('.countdown-link');

      links.forEach(function(link) {
        const baseUrl = link.getAttribute('data-url') || '/';
        const campaign = link.getAttribute('data-campaign') || 'hot-sale-2026';
        const source = link.getAttribute('data-source') || 'banner-countdown';
        const medium = link.getAttribute('data-medium') || 'web';

        const params = new URLSearchParams({
          utm_source: source,
          utm_medium: medium,
          utm_campaign: campaign,
          utm_content: 'countdown-timer'
        });

        link.href = baseUrl + '?' + params.toString();

        link.addEventListener('click', function() {
          if (typeof gtag !== 'undefined') {
            gtag('event', 'countdown_click', {
              event_category: 'engagement',
              event_label: campaign,
              campaign_name: campaign,
              source: source,
              medium: medium
            });
          }

          if (typeof ga !== 'undefined') {
            ga('send', 'event', 'Countdown', 'Click', campaign);
          }
        });
      });
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = countdownDate - now;
      const countdownElement = container.querySelector('.countdown-timer');

      if (!countdownElement) return;

      if (distance < 0) {
        countdownElement.innerHTML = '';
        const message = document.createElement('p');
        message.style.fontSize = '1.5rem';
        message.style.margin = '0';
        message.textContent = '¡TEXTO ACTUALIZADO!';
        countdownElement.appendChild(message);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      const values = {
        '[data-countdown-days]': days,
        '[data-countdown-hours]': hours,
        '[data-countdown-minutes]': minutes,
        '[data-countdown-seconds]': seconds
      };

      Object.keys(values).forEach(function(selector) {
        const element = container.querySelector(selector);
        if (element) element.textContent = String(values[selector]).padStart(2, '0');
      });
    }

    setupTrackingLinks();
    updateCountdown();

    const intervalId = setInterval(updateCountdown, 1000);

    if (typeof MutationObserver !== 'undefined') {
      const observer = new MutationObserver(function() {
        if (!document.body.contains(container)) {
          clearInterval(intervalId);
          observer.disconnect();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });
    }
  })();
</script>
