<style type="text/css">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');

  .cdr-banner {
    --digit-box-bg:   #333333;
    --digit-color:    #ffffff;
    --label-color:    #ffffff;
    --sep-color:      #ffffff;
    
    /* Responsive custom properties using Viewport Width (vw) as a fallback */
    --digit-size:      clamp(12px, 3.3vw, 48px);
    --label-size:      clamp(7px, 1vw, 14px);
    --sep-size:        clamp(10px, 2.5vw, 36px);
    --box-w:          clamp(14px, 3.7vw, 53px);
    --box-h:          clamp(20px, 5.5vw, 80px);
    --box-radius:      clamp(2px, 0.55vw, 8px);
    --box-gap:        clamp(1px, 0.28vw, 4px);
    --group-gap:      clamp(4px, 1.25vw, 18px);
    --sep-margin-bottom: clamp(1px, 0.7vw, 10px);
    --label-gap:      clamp(2px, 0.4vw, 6px);
  }

  /* Progressive enhancement using container query units (cqw) for perfect context-aware scaling */
  @supports (width: 1cqw) {
    .cdr-banner {
      container-type: inline-size;
      --digit-size:      clamp(12px, 3.3cqw, 48px);
      --label-size:      clamp(7px, 1cqw, 14px);
      --sep-size:        clamp(10px, 2.5cqw, 36px);
      --box-w:          clamp(14px, 3.7cqw, 53px);
      --box-h:          clamp(20px, 5.5cqw, 80px);
      --box-radius:      clamp(2px, 0.55cqw, 8px);
      --box-gap:        clamp(1px, 0.28cqw, 4px);
      --group-gap:      clamp(4px, 1.25cqw, 18px);
      --sep-margin-bottom: clamp(1px, 0.7cqw, 10px);
      --label-gap:      clamp(2px, 0.4cqw, 6px);
    }
  }

  .cdr-banner {
    position:        relative;
    width:           100%;
    overflow:        hidden;
    font-family:     'Inter', Arial, sans-serif;
    display:         block;
    line-height:     0;
  }

  .cdr-bg-img {
    width:           100%;
    height:          auto;
    display:         block;
  }

  .cdr-timer {
    position:        absolute;
    top:             50%;
    left:            50%;
    transform:       translate(-50%, -50%);
    display:         flex;
    align-items:     center;
    gap:             var(--group-gap);
  }

  .cdr-group {
    display:         flex;
    flex-direction:  column;
    align-items:     center;
    gap:             var(--label-gap);
  }

  .cdr-label {
    font-size:       var(--label-size);
    font-weight:     700;
    color:           var(--label-color);
    text-transform:  none;
    letter-spacing:  0.02em;
    white-space:     nowrap;
    line-height:     1;
  }

  .cdr-digits {
    display:         flex;
    gap:             var(--box-gap);
  }

  .cdr-digit {
    width:           var(--box-w);
    height:          var(--box-h);
    background:      var(--digit-box-bg);
    border-radius:   var(--box-radius);
    display:         flex;
    align-items:     center;
    justify-content: center;
    font-size:       var(--digit-size);
    font-weight:     700;
    color:           var(--digit-color);
    font-variant-numeric: tabular-nums;
    line-height:     1;
    transition:      transform 0.1s ease;
    box-shadow:      0 clamp(2px, 0.3vw, 4px) clamp(3px, 0.4vw, 6px) rgba(0, 0, 0, 0.2);
  }

  @supports (width: 1cqw) {
    .cdr-digit {
      box-shadow:    0 clamp(2px, 0.3cqw, 4px) clamp(3px, 0.4cqw, 6px) rgba(0, 0, 0, 0.2);
    }
  }

  .cdr-digit.flip {
    transform: scale(0.88);
  }

  .cdr-sep {
    font-size:       var(--sep-size);
    font-weight:     700;
    color:           var(--sep-color);
    align-self:      flex-end;
    margin-bottom:   var(--sep-margin-bottom);
    line-height:     1;
    opacity:         0.9;
    animation:       cdrBlink 1s step-end infinite;
  }

  @keyframes cdrBlink {
    0%, 100% { opacity: 0.9; }
    50%       { opacity: 0.3; }
  }

  .cdr-expired {
    position:        absolute;
    top:             50%;
    left:            50%;
    transform:       translate(-50%, -50%);
    font-size:       clamp(0.75rem, 2.5vw, 1.5rem);
    font-weight:     700;
    color:           #ffffff;
    white-space:     nowrap;
    text-shadow:     0 2px 8px rgba(0,0,0,0.5);
  }

  @supports (width: 1cqw) {
    .cdr-expired {
      font-size:       clamp(0.75rem, 2.5cqw, 1.5rem);
    }
  }
</style>

<div class="cdr-banner">
  <img src="https://image.grupodabra.com/lib/fe37157175640478731176/m/1/1d3f9e49-3c69-4b4b-8d4a-0131cdcb7a59.png" class="cdr-bg-img" alt="Banner">
  
  <div class="cdr-timer" id="cdr-timer">
    <div class="cdr-group">
      <span class="cdr-label">D&iacute;as</span>
      <div class="cdr-digits">
        <span class="cdr-digit" id="cdr-d0">0</span>
        <span class="cdr-digit" id="cdr-d1">0</span>
      </div>
    </div>
    <span class="cdr-sep">:</span>

    <div class="cdr-group">
      <span class="cdr-label">Horas</span>
      <div class="cdr-digits">
        <span class="cdr-digit" id="cdr-h0">0</span>
        <span class="cdr-digit" id="cdr-h1">0</span>
      </div>
    </div>
    <span class="cdr-sep">:</span>

    <div class="cdr-group">
      <span class="cdr-label">Minutos</span>
      <div class="cdr-digits">
        <span class="cdr-digit" id="cdr-m0">0</span>
        <span class="cdr-digit" id="cdr-m1">0</span>
      </div>
    </div>
    <span class="cdr-sep">:</span>

    <div class="cdr-group">
      <span class="cdr-label">Segundos</span>
      <div class="cdr-digits">
        <span class="cdr-digit" id="cdr-s0">0</span>
        <span class="cdr-digit" id="cdr-s1">0</span>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var TARGET      = new Date('2026-06-11T19:00:00Z').getTime();
  var EXPIRED_MSG = '¡Arrancó el Mundial!';

  function initCountdown() {
    var elTimer = document.getElementById('cdr-timer');

    if (!elTimer) {
      setTimeout(initCountdown, 100);
      return;
    }

    var els = {
      d0: document.getElementById('cdr-d0'),
      d1: document.getElementById('cdr-d1'),
      h0: document.getElementById('cdr-h0'),
      h1: document.getElementById('cdr-h1'),
      m0: document.getElementById('cdr-m0'),
      m1: document.getElementById('cdr-m1'),
      s0: document.getElementById('cdr-s0'),
      s1: document.getElementById('cdr-s1')
    };

    function setDigits(el0, el1, value) {
      var str = String(value);
      if (str.length === 1) {
        str = '0' + str;
      }
      el0.textContent = str.charAt(0);
      el1.textContent = str.charAt(1);
    }

    function flip(el) {
      if (!el) { return; }
      el.classList.add('flip');
      setTimeout(function () { el.classList.remove('flip'); }, 110);
    }

    var prevSec = -1;

    function tick() {
      var diff = TARGET - Date.now();

      if (diff === 0 || diff.toString().charAt(0) === '-') {
        elTimer.innerHTML = '';
        var expDiv = document.createElement('div');
        expDiv.className = 'cdr-expired';
        expDiv.textContent = EXPIRED_MSG;
        elTimer.appendChild(expDiv);
        return;
      }

      var days  = Math.floor(diff / 86400000);
      var hours = Math.floor((diff % 86400000) / 3600000);
      var mins  = Math.floor((diff % 3600000)  / 60000);
      var secs  = Math.floor((diff % 60000)    / 1000);

      if (secs !== prevSec) {
        flip(els.s0); flip(els.s1);
        if (secs === 59) { flip(els.m0); flip(els.m1); }
        if (secs === 59 && mins === 59) { flip(els.h0); flip(els.h1); }
        if (secs === 59 && mins === 59 && hours === 23) { flip(els.d0); flip(els.d1); }
        prevSec = secs;
      }

      setDigits(els.d0, els.d1, days);
      setDigits(els.h0, els.h1, hours);
      setDigits(els.m0, els.m1, mins);
      setDigits(els.s0, els.s1, secs);
    }

    tick();
    setInterval(tick, 1000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCountdown);
  } else {
    initCountdown();
  }

}());
</script>
